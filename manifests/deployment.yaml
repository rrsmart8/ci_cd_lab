apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: gitlab.cs.pub.ro:5050/rrsmart8/ci_cd_lab:latest
          ports:
            - containerPort: 8080
      imagePullSecrets:
        - name: gitlab-secret
